<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Nova senha — Pérolas de Maria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Lora:wght@400;500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>

<div class="login-screen">
  <div class="login-card">
    <h1>Nova senha</h1>
    <p class="sub">Escolha uma nova senha para acessar o painel.</p>

    <form id="updateForm">
      <div class="field">
        <label for="newPassword">Nova senha</label>
        <input type="password" id="newPassword" minlength="6" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary" id="updateBtn">Salvar nova senha</button>
      <p class="form-msg" id="updateMsg"></p>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script>
  // The link from the reset-password e-mail lands here already carrying a
  // temporary "recovery" session — sb.auth handles that automatically from
  // the URL. We just need to call updateUser() with the new password.
  document.getElementById('updateForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = document.getElementById('updateBtn');
    const msg = document.getElementById('updateMsg');
    const newPassword = document.getElementById('newPassword').value;

    btn.disabled = true;
    msg.textContent = '';
    msg.className = 'form-msg';

    const { error } = await sb.auth.updateUser({ password: newPassword });

    if(error){
      msg.textContent = 'Não foi possível salvar: ' + error.message;
      msg.className = 'form-msg error';
      btn.disabled = false;
      return;
    }

    msg.textContent = 'Senha atualizada! Redirecionando para o login...';
    msg.className = 'form-msg ok';
    setTimeout(function(){ window.location.href = '/admin'; }, 1800);
  });
</script>
</body>
</html>
